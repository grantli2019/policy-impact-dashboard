name: 政策数据自动更新

on:
  schedule:
    # 每周一 00:00 UTC (北京时间 08:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  update-policies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓取最新政策数据
        run: node scripts/update-policies.mjs
        continue-on-error: true

      - name: 检查是否有更新
        id: check
        run: |
          if [ -f scripts/latest-updates.json ]; then
            COUNT=$(node -e "const d=require('./scripts/latest-updates.json');console.log(d.length)")
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            if [ "$COUNT" -gt "0" ]; then
              echo "has_updates=true" >> $GITHUB_OUTPUT
            else
              echo "has_updates=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

      - name: 创建更新分支并提交
        if: steps.check.outputs.has_updates == 'true'
        run: |
          BRANCH="auto/policy-update-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git add scripts/latest-updates.json scripts/update-summary.md
          git config user.name "CechachaBot"
          git config user.email "bot@cechacha.com"
          git commit -m "data: 自动抓取政策更新 ${{ steps.check.outputs.count }} 条

来源：gov.cn / mohrss / mohurd / moe / nhsa / pbc
请人工审核后合并到 src/data/impactData.js"
          git push origin $BRANCH

      - name: 创建 Pull Request
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('scripts/update-summary.md') 
              ? fs.readFileSync('scripts/update-summary.md', 'utf8') 
              : '自动抓取的政策更新';
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 政策数据自动更新 (${new Date().toISOString().slice(0,10)})`,
              body: `## 自动抓取结果\n\n${summary}\n\n---\n⚠️ 请人工审核数据准确性后合并`,
              head: `auto/policy-update-${new Date().toISOString().slice(0,10).replace(/-/g,'')}`,
              base: 'main',
            });
